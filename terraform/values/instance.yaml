instance:
  distribution:
    version: ${distribution_version}
    registry: ${distribution_registry}
    artifact: ${distribution_artifact}
  sync:
    kind: ${sync_kind}
    url: ${sync_url}
    path: ${sync_path}
    ref: ${sync_kind}
    pullSecret: ${sync_pull_secret}
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: true
    tenantDefaultServiceAccount: flux
    networkPolicy: true
    domain: "cluster.local"
  kustomize:
    patches:
      - target:
          kind: Deployment
          name: "(kustomize-controller|helm-controller)"
        patch: |
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --concurrent=10
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: --requeue-dependency=10s
      - target:
          kind: OCIRepository
          name: flux-system
        patch: |
          - op: add
            path: /spec/verify
            value:
              provider: cosign
              matchOIDCIdentity:
              - issuer: ^https://token\.actions\.githubusercontent\.com$
                subject: ^https://github\.com/1ab-io/d2-fleet/\.github/workflows/push-artifact\.yaml@refs/heads/main$
